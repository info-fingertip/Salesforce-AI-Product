<template>
    <lightning-card title="Salesforce AI Assistant" icon-name="utility:einstein">

        <!-- Header -->
        <div class="slds-var-p-horizontal_medium slds-var-p-top_small">
            <div class="header-bar slds-grid slds-grid_align-spread slds-grid_vertical-align-center">
                <div class="slds-col">
                    <span class="hpill">✦ GPT-4o-mini</span>
                    <span class="hpill ml">⚡ Live Data</span>
                </div>
                <lightning-button-icon icon-name="utility:refresh" variant="border-filled" title="Clear" onclick={handleClear} size="small"></lightning-button-icon>
            </div>
        </div>

        <!-- Selectors -->
        <div class="slds-var-p-horizontal_medium slds-var-p-top_small">
            <div class="slds-grid slds-gutters_x-small slds-grid_vertical-align-end">
                <div class="slds-col slds-size_1-of-2">
                    <lightning-combobox label="Salesforce Object" placeholder="Select an object..."
                        options={objectOptions} value={selectedObject} onchange={handleObjectChange} disabled={isLoading}>
                    </lightning-combobox>
                </div>
                <div class="slds-col slds-size_1-of-2">
                    <lightning-input type="text" label="Filter (optional)" placeholder="e.g. StageName = 'Closed Won'"
                        value={filterClause} onchange={handleFilterChange} disabled={isLoading}>
                    </lightning-input>
                </div>
            </div>
        </div>

        <!-- Suggestions -->
        <template if:true={showSuggestions}>
            <div class="slds-var-p-horizontal_medium slds-var-p-top_small">
                <div class="sugg-row">
                    <template for:each={suggestions} for:item="s">
                        <span key={s} class="sugg-chip" onclick={handleSuggestionClick} data-question={s}>{s}</span>
                    </template>
                </div>
            </div>
        </template>

        <!-- Chat -->
        <div class="slds-var-p-horizontal_medium slds-var-p-top_small">
            <div class="chat-win">

                <template if:true={isEmpty}>
                    <div class="empty-st">
                        <div class="empty-ico">✦</div>
                        <p class="empty-ttl">Salesforce AI Assistant</p>
                        <p class="empty-sub">Select an object and ask anything about your data</p>
                    </div>
                </template>

                <template for:each={messages} for:item="msg">
                    <div key={msg.id} class={msg.wrapperClass}>

                        <!-- User -->
                        <template if:true={msg.isUser}>
                            <div class="bubble-user">
                                <p class="user-txt">{msg.text}</p>
                                <p class="ts">{msg.timestamp}</p>
                            </div>
                        </template>

                        <!-- AI -->
                        <template if:false={msg.isUser}>
                            <div class="bubble-ai">

                                <!-- AI top bar -->
                                <div class="ai-topbar">
                                    <div class="ai-left">
                                        <span class="ai-ava">✦</span>
                                        <span class="ai-lbl">AI Assistant</span>
                                        <template if:true={msg.objectName}>
                                            <span class="ai-tag">{msg.objectName}</span>
                                            <span class="ai-tag">{msg.recordCount} records</span>
                                        </template>
                                    </div>
                                    <template if:false={msg.isError}>
                                        <button class="dl-btn" onclick={handleDownload} data-msgid={msg.id} title="Download response">
                                            ⬇ Download
                                        </button>
                                    </template>
                                </div>

                                <!-- Error -->
                                <template if:true={msg.isError}>
                                    <div class="err-blk">⚠️ {msg.text}</div>
                                </template>

                                <!-- Dynamic blocks -->
                                <template if:false={msg.isError}>
                                    <div class="blocks">
                                        <template for:each={msg.blocks} for:item="blk">

                                            <h2 key={blk.id} if:true={blk.isH1} class="blk-h1">{blk.text}</h2>
                                            <h3 key={blk.id} if:true={blk.isH2} class="blk-h2">{blk.text}</h3>
                                            <div key={blk.id} if:true={blk.isCode} class="blk-code"><pre>{blk.text}</pre></div>
                                            <h4 key={blk.id} if:true={blk.isH3} class="blk-h3">{blk.text}</h4>
                                            <div key={blk.id} if:true={blk.isQuote} class="blk-quote">{blk.text}</div>
                                            <p key={blk.id} if:true={blk.isPara} class="blk-para">{blk.text}</p>
                                            <div key={blk.id} if:true={blk.isBullet} class="blk-bullet">
                                                <span class="bull-dot">•</span>
                                                <span class="bull-txt">{blk.text}</span>
                                            </div>
                                            <div key={blk.id} if:true={blk.isNumbered} class="blk-bullet">
                                                <span class="bull-dot num-dot">{blk.num}</span>
                                                <span class="bull-txt">{blk.text}</span>
                                            </div>

                                            <!-- Inline table wherever AI puts it -->
                                            <template if:true={blk.isTable}>
                                                <div key={blk.id} class="tbl-wrap">
                                                    <div class="tbl-scroll">
                                                        <table class="dtbl">
                                                            <thead>
                                                                <tr>
                                                                    <template for:each={blk.headers} for:item="h">
                                                                        <th key={h}>{h}</th>
                                                                    </template>
                                                                </tr>
                                                            </thead>
                                                            <tbody>
                                                                <template for:each={blk.rows} for:item="row">
                                                                    <tr key={row.id}>
                                                                        <template for:each={row.cells} for:item="cell">
                                                                            <td key={cell.key}>{cell.value}</td>
                                                                        </template>
                                                                    </tr>
                                                                </template>
                                                            </tbody>
                                                        </table>
                                                    </div>
                                                </div>
                                            </template>

                                        </template>
                                    </div>

                                    <!-- Auto chart from first numeric table -->
                                    <template if:true={msg.hasChart}>
                                        <div class="chart-wrap">
                                            <div class="chart-ttl">📈 {msg.chartTitle}</div>
                                            <template for:each={msg.chartBars} for:item="bar">
                                                <div key={bar.label} class="bar-row">
                                                    <span class="bar-lbl">{bar.label}</span>
                                                    <div class="bar-track">
                                                        <div class="bar-fill" style={bar.style}></div>
                                                    </div>
                                                    <span class="bar-val">{bar.displayValue}</span>
                                                </div>
                                            </template>
                                        </div>
                                    </template>

                                </template>

                                <p class="ts">{msg.timestamp}</p>
                            </div>
                        </template>

                    </div>
                </template>

                <!-- Typing indicator -->
                <template if:true={isLoading}>
                    <div class="msg-row msg-row_ai">
                        <div class="bubble-ai typing-bbl">
                            <div class="ai-topbar">
                                <span class="ai-ava">✦</span>
                                <span class="ai-lbl">Analysing your Salesforce data...</span>
                            </div>
                            <div class="dots"><span></span><span></span><span></span></div>
                        </div>
                    </div>
                </template>

            </div>
        </div>

        <!-- Input -->
        <div class="slds-var-p-around_medium">
            <div class="inp-row">
                <div class="inp-inner">
                    <lightning-textarea label="" placeholder="Ask anything — e.g. List all accounts with revenue, Show open deals by stage..."
                        value={currentQuestion} onchange={handleQuestionChange} onkeydown={handleKeyDown}
                        max-length="1000" disabled={isLoading}>
                    </lightning-textarea>
                </div>
                <lightning-button variant="brand" label="Ask AI" icon-name="utility:send" icon-position="right"
                    onclick={handleAsk} disabled={isSendDisabled}>
                </lightning-button>
            </div>
            <p class="inp-hint">Ctrl+Enter to send · Tables, charts and insights render automatically</p>
        </div>

    </lightning-card>
</template>
