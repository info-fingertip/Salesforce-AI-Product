<template>
    <lightning-card title="Salesforce AI Assistant" icon-name="utility:einstein">

        <!-- Header -->
        <div class="slds-var-p-horizontal_medium slds-var-p-top_small">
            <div class="header-bar slds-grid slds-grid_align-spread slds-grid_vertical-align-center">
                <div class="slds-col">
                    <span class="hpill">✦ AI Agent</span>
                    <span class="hpill ml">⚡ Live Data</span>
                    <span class="hpill ml">🔍 Auto-Query</span>
                </div>
                <lightning-button-icon icon-name="utility:refresh" variant="border-filled" title="Clear conversation" onclick={handleClear} size="small"></lightning-button-icon>
            </div>
        </div>

        <!-- Suggestions -->
        <template if:true={showSuggestions}>
            <div class="slds-var-p-horizontal_medium slds-var-p-top_small">
                <div class="sugg-row">
                    <template for:each={suggestions} for:item="s">
                        <span key={s} class="sugg-chip" onclick={handleSuggestionClick} data-question={s}>{s}</span>
                    </template>
                </div>
            </div>
        </template>

        <!-- Chat window -->
        <div class="slds-var-p-horizontal_medium slds-var-p-top_small">
            <div class="chat-win">

                <!-- Empty state -->
                <template if:true={isEmpty}>
                    <div class="empty-st">
                        <div class="empty-ico">✦</div>
                        <p class="empty-ttl">Salesforce AI Agent</p>
                        <p class="empty-sub">Ask anything about your Salesforce data — I'll figure out what to query</p>
                    </div>
                </template>

                <!-- Messages -->
                <template for:each={messages} for:item="msg">
                    <div key={msg.id} class={msg.wrapperClass}>

                        <!-- User message -->
                        <template if:true={msg.isUser}>
                            <div class="bubble-user">
                                <p class="user-txt">{msg.text}</p>
                                <p class="ts">{msg.timestamp}</p>
                            </div>
                        </template>

                        <!-- AI message -->
                        <template if:false={msg.isUser}>
                            <div class="bubble-ai">

                                <!-- Top bar -->
                                <div class="ai-topbar">
                                    <div class="ai-left">
                                        <span class="ai-ava">✦</span>
                                        <span class="ai-lbl">AI Agent</span>
                                        <template if:true={msg.queriedObjects}>
                                            <span class="ai-tag">{msg.queriedObjects}</span>
                                            <span class="ai-tag">{msg.totalRecords} records</span>
                                        </template>
                                    </div>
                                    <template if:false={msg.isError}>
                                        <button class="dl-btn" onclick={handleDownload} data-msgid={msg.id} title="Download response">
                                            ⬇ Download
                                        </button>
                                    </template>
                                </div>

                                <!-- Error -->
                                <template if:true={msg.isError}>
                                    <div class="err-blk">⚠️ {msg.text}</div>
                                </template>

                                <!-- AI response — rendered HTML via lwc:dom="manual" -->
                                <template if:false={msg.isError}>
                                    <div class="ai-content" lwc:dom="manual" data-content-id={msg.id}></div>

                                    <!-- Auto chart (still LWC-rendered for reactivity) -->
                                    <template if:true={msg.hasChart}>
                                        <div class="chart-wrap">
                                            <div class="chart-ttl">📈 {msg.chartTitle}</div>
                                            <template for:each={msg.chartBars} for:item="bar">
                                                <div key={bar.label} class="bar-row">
                                                    <span class="bar-lbl">{bar.label}</span>
                                                    <div class="bar-track">
                                                        <div class="bar-fill" style={bar.style}></div>
                                                    </div>
                                                    <span class="bar-val">{bar.displayValue}</span>
                                                </div>
                                            </template>
                                        </div>
                                    </template>
                                </template>

                                <p class="ts">{msg.timestamp}</p>
                            </div>
                        </template>

                    </div>
                </template>

                <!-- Typing indicator -->
                <template if:true={isLoading}>
                    <div class="msg-row msg-row_ai">
                        <div class="bubble-ai typing-bbl">
                            <div class="ai-topbar">
                                <span class="ai-ava">✦</span>
                                <span class="ai-lbl">{statusText}</span>
                            </div>
                            <div class="dots"><span></span><span></span><span></span></div>
                        </div>
                    </div>
                </template>

            </div>
        </div>

        <!-- Input -->
        <div class="slds-var-p-around_medium">
            <div class="inp-row">
                <div class="inp-inner">
                    <lightning-textarea label="" placeholder="Ask anything about your Salesforce data — e.g. Show me top deals, List overdue cases, Accounts by industry..."
                        value={currentQuestion} onchange={handleQuestionChange} onkeydown={handleKeyDown}
                        max-length="1000" disabled={isLoading}>
                    </lightning-textarea>
                </div>
                <lightning-button variant="brand" label="Ask AI" icon-name="utility:send" icon-position="right"
                    onclick={handleAsk} disabled={isSendDisabled}>
                </lightning-button>
            </div>
            <p class="inp-hint">Ctrl+Enter to send · AI auto-detects objects, fields, and relationships · Follow-up questions supported</p>
        </div>

    </lightning-card>
</template>
